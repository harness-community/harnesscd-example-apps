                        NEW_URL: <+pipeline.stages.deploy_new.spec.execution.steps.vercel_deploy.output.outputVariables.DEPLOYMENT_URL>
                      command: |
                        apk add --no-cache curl jq

                        cat > payload.json <<EOF
                        {
                          "items": [{
                            "operation": "update",
                            "key": "traffic_config",
                            "value": {
                              "current_deployment": {"url": "$CURRENT_URL", "percentage": 25},
                              "new_deployment": {"url": "$NEW_URL", "percentage": 75},
                              "updated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
