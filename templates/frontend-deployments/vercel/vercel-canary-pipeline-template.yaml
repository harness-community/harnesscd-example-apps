      - stage:
          name: Full-Cutover-100
          identifier: full_cutover
          type: CI
          spec:
            cloneCodebase: false
            platform:
              os: Linux
              arch: Amd64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:
                - step:
                    name: Route-100-Traffic
                    identifier: route_100_percent
                    type: Run
                    spec:
                      image: alpine:latest
                      shell: Sh
                      envVariables:
                        VERCEL_TOKEN: <+secrets.getValue("vercel_token")>
                        EDGE_CONFIG_ID: <+pipeline.variables.edge_config_id>
                        VERCEL_ORG_ID: <+secrets.getValue("vercel_org_id")>
                        CURRENT_URL: <+pipeline.stages.deploy_new.spec.execution.steps.get_current.output.outputVariables.CURRENT_PRODUCTION_URL>
                        NEW_URL: <+pipeline.stages.deploy_new.spec.execution.steps.vercel_deploy.output.outputVariables.DEPLOYMENT_URL>
                      command: |
                        apk add --no-cache curl jq

                        cat > payload.json <<EOF
                        {
                          "items": [{
                            "operation": "update",
                            "key": "traffic_config",
                            "value": {
                              "current_deployment": {"url": "$NEW_URL", "percentage": 100},
                              "new_deployment": {"url": "", "percentage": 0},
                              "previous_deployment": {"url": "$CURRENT_URL"},
                              "updated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                            }
                          }]
                        }
                        EOF

                        curl -X PATCH \
                          "https://api.vercel.com/v1/edge-config/$EDGE_CONFIG_ID/items?teamId=$VERCEL_ORG_ID" \
                          -H "Authorization: Bearer $VERCEL_TOKEN" \
                          -H "Content-Type: application/json" \
                          -d @payload.json

                        echo "Full cutover complete: 100% to new"
    variables:
      - name: edge_config_id
        type: String
        description: Edge Config ID
        value: <+input>
        required: true
