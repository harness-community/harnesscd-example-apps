                    timeout: 2h
                    spec:
                      approvalMessage: 75% canary live. Approve for full cutover to 100%?
                      includePipelineExecutionHistory: true
                      approvers:
                        minimumCount: 1
                        disallowPipelineExecutor: false
                        userGroups:
                          - _project_all_project_users
                          - account._account_all_users
